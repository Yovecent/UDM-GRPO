wandb:
  run_id: null

experiment:
  project: ursa_1-7b_ibq512_pickscore
  log_every: 5
  save_every: 100
  resume_from_checkpoint: latest

model:
  name: "transformer"
  gradient_checkpointing: 1  # 1: +mlp_ckpt 2: +qkv_ckpt 3: layer_ckpt
  tokenizer:
    params:
      max_length: 320
      truncation: true
      padding_side: left
      padding: max_length

pipeline:
  target: diffnext.pipelines.ursa.pipeline_grpo.URSAGRPOPipeline
  paths:
      pretrained_path: /path/to/URSA-1.7B-IBQ512
      module_dict:
        vae: ${pipeline.paths.pretrained_path}/vae
        scheduler: ${pipeline.paths.pretrained_path}/scheduler
        tokenizer: ${pipeline.paths.pretrained_path}/tokenizer
        model_index: ${pipeline.paths.pretrained_path}/model_index.json

optimizer:
  target: torch.optim.AdamW
  param_groups: false
  params:
    lr: 1e-6
    betas: [0.9, 0.95]
    weight_decay: 0.01
    fused: true

lr_scheduler:
  target: diffnext.engine.lr_scheduler.ConstantLR
  params:
    lr_max: ${optimizer.params.lr}
    max_steps: ${training.max_train_steps}

train_dataloader:
  target: diffnext.data.flex_loaders.PromptDataLoader
  params:
    dataset: /share/project/panting/share_datasets/emu3_rl/pickscore_25k
    batch_size: 16  # = num_prompts
    seed: ${training.seed}
    num_workers: 1
    shuffle: true
    shard_id: 0
    num_shards: 1

training:
  num_batches: 1
  batch_size: 8  # = num_prompts * num_images // num_gpus // sampling.num_batches
  data_every: ${eval:'${sampling.num_batches} // ${training.num_batches}'}
  gradient_accumulation_steps: ${eval:'${training.num_batches} * ${sampling.train_steps}'}
  max_train_steps: 10000
  seed: 1337
  mixed_precision: bf16

reward:
  target: diffnext.rewards.reward_image.ComposeScorer
  params:
    scorers: ["pickscore"]
  advantage_clipping: 5
  ratio_clipping: 1e-4
  kl_beta: 0.05

sampling:
  num_batches: 1
  num_images_per_prompt: 16
  train_steps: 3
  train_start: [0, 3]  # [inclusive, exclusive)
  forward_process: true
  clean_response: true
  rollout:
    width: 512
    height: 512
    num_inference_steps: 10
    guidance_scale: 1
    output_type: "pt"
